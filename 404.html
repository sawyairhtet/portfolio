<!doctype html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; script-src 'self' https://plausible.io; style-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https://plausible.io;"
        />
        <meta name="theme-color" id="theme-color" content="#667eea" />
        <title>404 — Page Not Found | Saw Ye Htet</title>
        <meta
            name="description"
            content="The page you're looking for doesn't exist. Return to the homepage or explore other pages."
        />
        <meta name="robots" content="noindex, nofollow" />
        <meta name="author" content="Saw Ye Htet" />
        <link rel="stylesheet" href="/src/styles/404.css" />
        <link rel="icon" href="/assets/favicon-32.png" sizes="32x32" type="image/png" />
        <!-- Google Fonts - Inter -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Cantarell:ital,wght@0,400;0,700;1,400&display=swap"
            rel="stylesheet"
        />
        <!-- Font Awesome for icons -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />
        <script src="/head-bootstrap.js"></script>
        <!-- Plausible Analytics -->
        <script defer data-domain="sawyehtet.com" src="https://plausible.io/js/script.js"></script>
    </head>
    <body>
        <!-- Top Bar (GNOME Panel) -->
        <div class="top-bar">
            <!-- GNOME Panel Left - Activities -->
            <div class="menu-bar-left">
                <button
                    class="activities-btn"
                    aria-disabled="true"
                    disabled
                    title="Activities overview (decorative)"
                >
                    Activities
                </button>
            </div>

            <!-- Status Bar (Mobile/Tablet only) -->
            <div class="status-bar" role="presentation" aria-label="Status bar (decorative)">
                <div class="status-time" aria-hidden="true"></div>
                <div class="status-icons" aria-hidden="true">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-three-quarters"></i>
                </div>
            </div>

            <!-- GNOME Panel Center - Clock -->
            <div class="menu-bar-center">
                <div class="menu-clock"></div>
            </div>

            <!-- GNOME Panel Right - Status Indicators -->
            <div class="menu-bar-right">
                <div class="status-menu">
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-volume-up"></i>
                    <i class="fas fa-battery-three-quarters"></i>
                    <i class="fas fa-power-off"></i>
                </div>
            </div>
        </div>

        <!-- Wallpaper -->
        <div class="main-content">
            <div class="wallpaper"></div>

            <!-- Error Content -->
            <div class="error-page">
                <div class="error-card">
                    <div class="error-icon">
                        <i class="fas fa-folder-open"></i>
                    </div>
                    <div class="error-code">404</div>
                    <h1 class="error-title">Page Not Found</h1>
                    <p class="error-message">
                        The file you're looking for seems to have been moved or deleted. Let's get
                        you back on track.
                    </p>
                    <div class="error-actions">
                        <a href="index.html" class="error-btn error-btn-primary">
                            <i class="fas fa-home"></i>
                            Go Home
                        </a>
                        <button id="go-back-btn" class="error-btn error-btn-secondary">
                            <i class="fas fa-arrow-left"></i>
                            Go Back
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Mini Dock -->
        <div class="dock-404">
            <a href="index.html" title="Home"><i class="fas fa-home"></i></a>
            <a href="https://github.com/sawyairhtet" target="_blank" title="GitHub"
                ><i class="fab fa-github"></i
            ></a>
            <a
                href="https://www.linkedin.com/in/saw-ye-htet-the-man-who-code/"
                target="_blank"
                title="LinkedIn"
                ><i class="fab fa-linkedin"></i
            ></a>
        </div>

        <script src="/404-page.js"></script>
    </body>
</html>
