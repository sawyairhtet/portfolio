[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    # --- Transport Security ---
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

    # --- Content Security Policy ---
    # Allows: self, Plausible analytics, Formspree contact form,
    #         service worker, PWA manifest, and inline styles.
    Content-Security-Policy = """
      default-src 'self'; \
      script-src 'self' https://plausible.io; \
      style-src 'self' 'unsafe-inline'; \
      font-src 'self'; \
      img-src 'self' data: https:; \
      connect-src 'self' https://formspree.io https://plausible.io; \
      worker-src 'self'; \
      manifest-src 'self'; \
      object-src 'none'; \
      frame-ancestors 'none'; \
      base-uri 'self'; \
      form-action 'self' https://formspree.io; \
      upgrade-insecure-requests"""

    # --- Clickjacking / Framing ---
    X-Frame-Options = "DENY"

    # --- MIME-sniffing ---
    X-Content-Type-Options = "nosniff"

    # --- XSS filter (disabled — CSP supersedes it; "0" is safest) ---
    X-XSS-Protection = "0"

    # --- Referrer ---
    Referrer-Policy = "strict-origin-when-cross-origin"

    # --- Permissions Policy (deny everything we don't use) ---
    Permissions-Policy = """
      camera=(), \
      microphone=(), \
      geolocation=(), \
      interest-cohort=(), \
      payment=(), \
      usb=(), \
      bluetooth=(), \
      serial=(), \
      hid=(), \
      ambient-light-sensor=(), \
      gyroscope=(), \
      magnetometer=(), \
      accelerometer=()"""

    # --- Cross-Origin Isolation ---
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/app/*"
  to = "/index.html"
  status = 200

# Blog routes (/blog, /blog/:slug) resolve to the SPA on direct load/refresh.
# Redundant with the catch-all below, but explicit for parity with /app/*.
[[redirects]]
  from = "/blog/*"
  to = "/index.html"
  status = 200

# SPA catch-all: deep links like /desktop and client routes resolve to the app.
# Static files (offline.html, 404.html, assets) are served before this applies.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
